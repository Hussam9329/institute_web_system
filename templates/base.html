<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}نظام إدارة المعهد{% endblock %}</title>
    
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/rtl.css">
    
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- ===== شريط التنقل العلوي ===== -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container-fluid">
            <!-- الشعار والعنوان -->
            <a class="navbar-brand fw-bold" href="/">
                <i class="fas fa-graduation-cap me-2"></i>نظام إدارة المعهد
            </a>
            
            <!-- زر القائمة للجوال -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <!-- قائمة التنقل -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
                            <i class="fas fa-home me-1"></i>الرئيسية
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/students' in request.url.path and '/accounting' not in request.url.path %}active{% endif %}" href="/students">
                            <i class="fas fa-user-graduate me-1"></i>الطلاب
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/teachers' in request.url.path and '/accounting' not in request.url.path %}active{% endif %}" href="/teachers">
                            <i class="fas fa-chalkboard-teacher me-1"></i>المدرسين
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/subjects' in request.url.path %}active{% endif %}" href="/subjects">
                            <i class="fas fa-book-open me-1"></i>المواد
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/payments' in request.url.path %}active{% endif %}" href="/payments">
                            <i class="fas fa-money-check-alt me-1"></i>الأقساط
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/accounting' in request.url.path %}active{% endif %}" href="/accounting">
                            <i class="fas fa-calculator me-1"></i>المحاسبة
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/reports' in request.url.path %}active{% endif %}" href="/reports">
                            <i class="fas fa-chart-line me-1"></i>التقارير
                        </a>
                    </li>
                </ul>
                
                <!-- البحث الشامل -->
                <div class="global-search-container me-3 d-none d-lg-block" style="width: 280px;">
                    <div class="input-group input-group-sm">
                        <span class="input-group-text bg-white border-end-0 text-muted">
                            <i class="fas fa-search"></i>
                        </span>
                        <input type="text" class="form-control border-start-0 bg-white" id="globalSearchInput"
                               placeholder="بحث سريع..." autocomplete="off">
                    </div>
                    <div class="global-search-results" id="globalSearchResults"></div>
                </div>
                
                <!-- الوقت والتاريخ -->
                <div class="text-white d-none d-lg-block small">
                    <i class="fas fa-clock me-1"></i>
                    <span id="current-datetime"></span>
                </div>
            </div>
        </div>
    </nav>

    <!-- ===== المحتوى الرئيسي ===== -->
    <main class="main-content mt-5 pt-4">
        {% block content %}{% endblock %}
    </main>

    <!-- ===== التذييل ===== -->
    <footer class="text-white py-3 mt-5">
        <div class="container text-center">
            <p class="mb-0 small">
                <i class="fas fa-graduation-cap me-1"></i>
                نظام إدارة المعهد المتكامل v2.0
                <span class="mx-2 opacity-50">|</span>
                جميع الحقوق محفوظة &copy; 2024
            </p>
        </div>
    </footer>

    <!-- ===== رسائل التنبيه ===== -->
    <div id="alert-container" class="position-fixed top-0 start-50 translate-middle-x pt-5" style="z-index: 9999;">
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/app.js"></script>
    
    <!-- البحث الشامل -->
    <script>
    let searchTimeout;
    const searchInput = document.getElementById('globalSearchInput');
    const searchResults = document.getElementById('globalSearchResults');
    
    if (searchInput) {
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            const query = this.value.trim();
            
            if (query.length < 2) {
                searchResults.classList.remove('show');
                return;
            }
            
            searchTimeout = setTimeout(async () => {
                try {
                    const result = await apiRequest(`/api/search?q=${encodeURIComponent(query)}`);
                    let html = '';
                    
                    if (result.data.students && result.data.students.length > 0) {
                        html += '<div class="search-result-label"><i class="fas fa-user-graduate me-1"></i>الطلاب</div>';
                        result.data.students.forEach(s => {
                            html += `<a href="/students/${s.id}" class="search-result-item">
                                <div class="fw-semibold">${s.name}</div>
                                <small class="text-muted">${s.barcode} | ${s.study_type} | ${s.status}</small>
                            </a>`;
                        });
                    }
                    
                    if (result.data.teachers && result.data.teachers.length > 0) {
                        html += '<div class="search-result-label"><i class="fas fa-chalkboard-teacher me-1"></i>المدرسين</div>';
                        result.data.teachers.forEach(t => {
                            html += `<a href="/teachers/${t.id}" class="search-result-item">
                                <div class="fw-semibold">${t.name}</div>
                                <small class="text-muted">${t.subject} | ${formatCurrency(t.total_fee)}</small>
                            </a>`;
                        });
                    }
                    
                    if (result.data.subjects && result.data.subjects.length > 0) {
                        html += '<div class="search-result-label"><i class="fas fa-book-open me-1"></i>المواد</div>';
                        result.data.subjects.forEach(s => {
                            html += `<a href="/subjects" class="search-result-item">
                                <div class="fw-semibold">${s.name}</div>
                            </a>`;
                        });
                    }
                    
                    if (!html) {
                        html = '<div class="text-center py-3 text-muted">لا توجد نتائج</div>';
                    }
                    
                    searchResults.innerHTML = html;
                    searchResults.classList.add('show');
                } catch (error) {
                    console.error('Search error:', error);
                }
            }, 300);
        });
        
        // إخفاء نتائج البحث عند النقر خارجها
        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.classList.remove('show');
            }
        });
        
        // اختصار Ctrl+K للبحث
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                searchInput.focus();
            }
            if (e.key === 'Escape') {
                searchResults.classList.remove('show');
                searchInput.blur();
            }
        });
    }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
