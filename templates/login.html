<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - {{ app_title }}</title>
    <link href="/static/vendor/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="/static/vendor/fontawesome-all.min.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Cairo';
            src: url('/static/fonts/Cairo-Regular.ttf') format('truetype');
            font-weight: 400;
            font-display: swap;
        }
        @font-face {
            font-family: 'Cairo';
            src: url('/static/fonts/Cairo-Bold.ttf') format('truetype');
            font-weight: 700;
            font-display: swap;
        }
        * { font-family: 'Cairo', 'Tajawal', 'NotoArabic', 'Segoe UI', Tahoma, Arial, sans-serif; }
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top right, rgba(79, 70, 229, 0.35), transparent 35%),
                linear-gradient(135deg, #0f172a 0%, #1e1b4b 45%, #020617 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
        }
        .login-card {
            width: 100%;
            max-width: 430px;
            border-radius: 28px;
            padding: 34px 28px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(18px);
            box-shadow: 0 30px 90px rgba(0,0,0,0.35);
        }
        .login-logo {
            width: 72px;
            height: 72px;
            border-radius: 24px;
            margin: 0 auto 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            color: #fff;
            box-shadow: 0 14px 30px rgba(79,70,229,0.35);
        }
        .login-logo i {
            font-size: 2rem;
            color: #fff;
        }
        .login-title {
            color: #0f172a;
            font-weight: 800;
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .login-subtitle {
            color: #64748b;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .form-control {
            height: 52px;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            font-size: 0.95rem;
        }
        .form-control:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 0.2rem rgba(79, 70, 229, 0.15);
        }
        .input-group-text {
            border-radius: 16px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-right: none;
            color: #4f46e5;
        }
        .form-control {
            border-left: none;
            border-radius: 0 16px 16px 0;
        }
        .btn-login {
            height: 54px;
            width: 100%;
            border-radius: 18px;
            border: none;
            font-weight: 800;
            font-size: 1.05rem;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            color: #fff;
            box-shadow: 0 16px 36px rgba(79,70,229,0.32);
            transition: all 0.3s;
        }
        .btn-login:hover {
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 20px 44px rgba(79,70,229,0.4);
        }
        .form-check-input:checked {
            background-color: #4f46e5;
            border-color: #4f46e5;
        }
        .alert-danger {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.2);
            color: #dc2626;
            border-radius: 14px;
            font-size: 0.875rem;
        }
        .version-text {
            color: #94a3b8;
            text-align: center;
            font-size: 0.75rem;
            margin-top: 1.5rem;
        }
        @media (max-width: 576px) {
            .login-card {
                padding: 28px 20px;
                border-radius: 24px;
            }
            .login-title {
                font-size: 1.45rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <h1 class="login-title">تسجيل الدخول</h1>
        <p class="login-subtitle">أدخل بيانات حسابك للوصول إلى النظام</p>

        {% if error == 'invalid' %}
        <div class="alert alert-danger d-flex align-items-center" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            اسم المستخدم أو كلمة المرور غير صحيحة
        </div>
        {% elif error == 'no_permission' %}
        <div class="alert alert-danger d-flex align-items-center" role="alert">
            <i class="fas fa-lock me-2"></i>
            ليس لديك صلاحية للوصول إلى هذه الصفحة
        </div>
        {% elif error %}
        <div class="alert alert-danger d-flex align-items-center" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/api/login">
            <div class="mb-3">
                <label class="form-label fw-bold mb-1" style="font-size: 0.85rem; color: var(--app-text-secondary, #334155);">اسم المستخدم</label>
                <div class="input-group">
                    <input type="text" name="username" class="form-control" placeholder="admin" required autofocus autocomplete="username">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold mb-1" style="font-size: 0.85rem; color: var(--app-text-secondary, #334155);">كلمة المرور</label>
                <div class="input-group">
                    <input type="password" name="password" class="form-control" placeholder="••••" required autocomplete="current-password">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <label class="form-check-label d-flex align-items-center gap-2" style="cursor:pointer;">
                    <input type="checkbox" name="remember" class="form-check-input">
                    <span style="font-size:0.88rem; color: var(--app-muted, #475569);">تذكرني على هذا الجهاز</span>
                </label>
            </div>

            <button type="submit" class="btn btn-login">
                <i class="fas fa-sign-in-alt me-2"></i>
                دخول
            </button>
        </form>
        <div class="version-text">{{ app_title }}</div>
    </div>
</body>
</html>
