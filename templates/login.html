<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - {{ app_title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(26, 26, 26, 0.95);
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        .login-logo {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: linear-gradient(135deg, #d4af37, #b8960f);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .login-logo i { font-size: 1.75rem; color: #000; }
        .login-title {
            color: #fff;
            font-weight: 700;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .login-subtitle {
            color: #888;
            text-align: center;
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }
        .form-control {
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            color: #fff;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
        }
        .form-control:focus {
            background: #0f0f0f;
            border-color: #d4af37;
            color: #fff;
            box-shadow: 0 0 0 0.2rem rgba(212, 175, 55, 0.15);
        }
        .form-control::placeholder { color: #555; }
        .input-group-text {
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-left: none;
            color: #d4af37;
            border-radius: 0 12px 12px 0;
        }
        .form-control { border-right: none; border-radius: 12px 0 0 12px; }
        .btn-login {
            background: linear-gradient(135deg, #d4af37, #b8960f);
            color: #000;
            font-weight: 700;
            border-radius: 12px;
            padding: 0.75rem;
            font-size: 1rem;
            width: 100%;
            border: none;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #e6c65a, #d4af37);
            color: #000;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
        .alert-danger {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #ff6b6b;
            border-radius: 12px;
            font-size: 0.875rem;
        }
        .version-text {
            color: #444;
            text-align: center;
            font-size: 0.75rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <h1 class="login-title">تسجيل الدخول</h1>
        <p class="login-subtitle">أدخل بيانات حسابك للوصول إلى النظام</p>

        {% if error == 'invalid' %}
        <div class="alert alert-danger d-flex align-items-center" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            اسم المستخدم أو كلمة المرور غير صحيحة
        </div>
        {% elif error == 'no_permission' %}
        <div class="alert alert-danger d-flex align-items-center" role="alert">
            <i class="fas fa-lock me-2"></i>
            ليس لديك صلاحية للوصول إلى هذه الصفحة
        </div>
        {% elif error %}
        <div class="alert alert-danger d-flex align-items-center" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/api/login">
            <div class="mb-3">
                <label class="form-label text-secondary mb-1" style="font-size: 0.85rem;">اسم المستخدم</label>
                <div class="input-group">
                    <input type="text" name="username" class="form-control" placeholder="admin" required autofocus autocomplete="username">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary mb-1" style="font-size: 0.85rem;">كلمة المرور</label>
                <div class="input-group">
                    <input type="password" name="password" class="form-control" placeholder="••••" required autocomplete="current-password">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                </div>
            </div>
            <button type="submit" class="btn btn-login">
                <i class="fas fa-sign-in-alt me-2"></i>
                دخول
            </button>
        </form>
        <div class="version-text">{{ app_title }}</div>
    </div>
</body>
</html>
