<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}تقرير{% endblock %} - {{ app_title }}</title>
    <link href="/static/vendor/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="/static/vendor/fontawesome-all.min.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'NotoArabic';
            src: url('/static/fonts/NotoSansArabic-Regular.ttf') format('truetype');
            font-weight: 400;
            font-display: swap;
        }
        @font-face {
            font-family: 'NotoArabic';
            src: url('/static/fonts/NotoSansArabic-Bold.ttf') format('truetype');
            font-weight: 700;
            font-display: swap;
        }
        @font-face {
            font-family: 'NotoArabic';
            src: url('/static/fonts/NotoSansArabic-Medium.ttf') format('truetype');
            font-weight: 500;
            font-display: swap;
        }
        @font-face {
            font-family: 'NotoArabic';
            src: url('/static/fonts/NotoSansArabic-SemiBold.ttf') format('truetype');
            font-weight: 600;
            font-display: swap;
        }
        @font-face {
            font-family: 'NotoArabic';
            src: url('/static/fonts/NotoSansArabic-Light.ttf') format('truetype');
            font-weight: 300;
            font-display: swap;
        }
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --primary-darker: #3730a3;
            --secondary: #8b5cf6;
            --secondary-light: #a78bfa;
            --secondary-dark: #7c3aed;
            --sidebar-dark: #1e1b4b;
            --sidebar-mid: #2d2a6e;
            --success: #10b981;
            --success-light: #34d399;
            --danger: #ef4444;
            --danger-light: #f87171;
            --warning: #f59e0b;
            --warning-light: #fbbf24;
            --info: #06b6d4;
            --dark: #0f172a;
            --muted: #64748b;
            --muted-light: #94a3b8;
            --light: #f1f5f9;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'NotoArabic', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--light);
            color: var(--dark);
            line-height: 1.7;
            direction: rtl;
        }

        /* ===== شريط الأدوات العلوي ===== */
        .report-toolbar {
            background: linear-gradient(135deg, var(--sidebar-dark) 0%, var(--primary-darker) 100%);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(30, 27, 75, 0.3);
        }

        .toolbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--white);
        }

        .toolbar-brand i {
            font-size: 20px;
            color: var(--secondary-light);
        }

        .toolbar-brand span {
            font-weight: 700;
            font-size: 16px;
        }

        .toolbar-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-print {
            background: linear-gradient(135deg, var(--secondary-light), var(--secondary));
            color: var(--white);
            border: none;
            padding: 8px 20px;
            border-radius: 10px;
            font-family: 'NotoArabic', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-print:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }

        /* زر تخصيص التقرير */
        .btn-customize {
            background: rgba(255, 255, 255, 0.12);
            color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 10px;
            font-family: 'NotoArabic', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-customize:hover {
            background: rgba(255, 255, 255, 0.22);
            transform: translateY(-1px);
        }

        .btn-close-report {
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 10px;
            font-family: 'NotoArabic', sans-serif;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-close-report:hover {
            background: rgba(255, 255, 255, 0.2);
            color: var(--white);
        }

        /* ===== لوحة تخصيص التقرير ===== */
        .customize-panel {
            background: var(--white);
            border-bottom: 2px solid var(--primary-light);
            padding: 16px 24px;
            display: none;
            animation: slideDown 0.25s ease;
        }

        .customize-panel.open {
            display: block;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .customize-panel h6 {
            font-size: 14px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .customize-columns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .col-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--light);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 12px;
            font-weight: 500;
            user-select: none;
        }

        .col-toggle:hover {
            border-color: var(--primary-light);
            background: #eff6ff;
        }

        .col-toggle input[type="checkbox"] {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .col-toggle.active {
            background: #eff6ff;
            border-color: var(--primary-light);
            color: var(--primary-dark);
        }

        /* ===== شريط البحث والفرز ===== */
        .report-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 14px 24px;
            background: #fafbfc;
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .report-search-box {
            position: relative;
            flex: 1;
            min-width: 200px;
            max-width: 350px;
        }

        .report-search-box input {
            width: 100%;
            padding: 7px 12px 7px 34px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'NotoArabic', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            direction: rtl;
        }

        .report-search-box input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .report-search-box i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted-light);
            font-size: 13px;
        }

        .report-sort-box,
        .report-date-filter {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .report-sort-box label,
        .report-date-filter label {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            white-space: nowrap;
        }

        .report-sort-box select,
        .report-date-filter input {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'NotoArabic', sans-serif;
            font-size: 12px;
            outline: none;
            cursor: pointer;
            background: var(--white);
        }

        .report-sort-box select:focus,
        .report-date-filter input:focus {
            border-color: var(--primary-light);
        }

        .report-controls-count {
            font-size: 12px;
            color: var(--muted);
            margin-right: auto;
        }

        .report-controls-count strong {
            color: var(--primary);
        }

        /* ===== محتوى التقرير ===== */
        .report-container {
            max-width: 900px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .report-card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        /* ===== رأس التقرير ===== */
        .report-header {
            background: linear-gradient(135deg, var(--sidebar-dark) 0%, var(--primary-darker) 50%, var(--primary-dark) 100%);
            padding: 28px 32px;
            color: var(--white);
            position: relative;
            overflow: hidden;
        }

        .report-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--secondary), var(--primary-light), var(--secondary-light));
        }

        .report-header::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15), transparent 70%);
            border-radius: 50%;
        }

        .report-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 4px;
            position: relative;
        }

        .report-subtitle {
            font-size: 13px;
            font-weight: 400;
            opacity: 0.8;
        }

        .report-date {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 8px;
        }

        /* ===== بطاقات KPI ===== */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            padding: 20px 24px;
        }

        .kpi-card {
            border-radius: 14px;
            padding: 14px 16px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 3px;
        }

        .kpi-value {
            font-size: 18px;
            font-weight: 800;
            line-height: 1.4;
        }

        .kpi-label {
            font-size: 11px;
            font-weight: 500;
            opacity: 0.7;
            margin-top: 2px;
        }

        .kpi-accent { background: #eff6ff; color: var(--primary); }
        .kpi-accent::before { background: var(--primary); }
        .kpi-success { background: #ecfdf5; color: var(--success); }
        .kpi-success::before { background: var(--success); }
        .kpi-danger { background: #fef2f2; color: var(--danger); }
        .kpi-danger::before { background: var(--danger); }
        .kpi-warning { background: #fffbeb; color: var(--warning); }
        .kpi-warning::before { background: var(--warning); }
        .kpi-info { background: #f0f9ff; color: var(--info); }
        .kpi-info::before { background: var(--info); }
        .kpi-purple { background: #f5f3ff; color: var(--secondary); }
        .kpi-purple::before { background: var(--secondary); }

        /* ===== قسم ===== */
        .report-section {
            padding: 0 24px;
            margin-top: 20px;
        }

        .section-title {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: var(--white);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            font-size: 12px;
            opacity: 0.8;
        }

        /* ===== بطاقات المعلومات ===== */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
        }

        .info-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            transition: box-shadow 0.2s ease;
        }

        .info-card:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .info-label {
            font-size: 11px;
            color: var(--muted);
            font-weight: 500;
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--dark);
        }

        /* ===== الجداول ===== */
        .report-table-wrapper {
            border-radius: 14px;
            overflow-x: auto;
            border: 1px solid var(--border);
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            table-layout: auto;
        }

        .report-table thead th {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            padding: 10px 14px;
            font-weight: 700;
            font-size: 12px;
            text-align: right;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: background 0.2s;
        }

        .report-table thead th:hover {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-darker));
        }

        .report-table thead th .sort-icon {
            display: inline-block;
            margin-right: 4px;
            font-size: 10px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .report-table thead th.sort-asc .sort-icon,
        .report-table thead th.sort-desc .sort-icon {
            opacity: 1;
            color: #fbbf24;
        }

        .report-table thead th.text-center,
        .report-table thead th[style*="center"] {
            text-align: center;
        }

        .report-table tbody td {
            padding: 9px 14px;
            border-bottom: 1px solid var(--light);
            vertical-align: middle;
            /* سطر واحد فقط - بدون التفاف */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            position: relative;
        }

        /* مؤشر بصري خفيف للخلايا المقتطعة */
        .report-table tbody td.cell-truncated {
            cursor: help;
        }

        .report-table tbody td.cell-truncated::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 8px;
            right: 8px;
            border-bottom: 1.5px dotted var(--muted-light);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .report-table tbody td.cell-truncated:hover::after {
            opacity: 1;
        }

        /* تلميح احترافي مخصص */
        .cell-tooltip {
            position: fixed;
            z-index: 9999;
            background: var(--sidebar-dark);
            color: var(--white);
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            line-height: 1.6;
            max-width: 350px;
            white-space: normal;
            word-wrap: break-word;
            box-shadow: 0 8px 30px rgba(30, 27, 75, 0.35);
            pointer-events: none;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .cell-tooltip.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .cell-tooltip::before {
            content: '';
            position: absolute;
            top: -5px;
            right: 16px;
            width: 10px;
            height: 10px;
            background: var(--sidebar-dark);
            transform: rotate(45deg);
            border-radius: 2px;
        }

        /* إخفاء العمود عند التخصيص */
        .report-table .col-hidden {
            display: none;
        }

        .report-table tbody tr.row-hidden {
            display: none;
        }

        .report-table tbody tr:nth-child(even) {
            background: #fafbfc;
        }

        .report-table tbody tr:hover {
            background: #f0f4ff;
        }

        .report-table tbody tr:last-child td {
            border-bottom: none;
        }

        .report-table .total-row {
            background: #eff6ff !important;
            font-weight: 700;
        }

        .report-table .total-row td {
            border-top: 2px solid var(--primary-light);
        }

        /* ===== وصل الدفع ===== */
        .receipt-container {
            max-width: 600px;
        }

        .receipt-amount {
            background: linear-gradient(135deg, var(--secondary), var(--primary-dark));
            color: var(--white);
            text-align: center;
            padding: 16px;
            border-radius: 14px;
            margin: 16px 24px;
        }

        .receipt-amount .amount-label {
            font-size: 12px;
            opacity: 0.8;
        }

        .receipt-amount .amount-value {
            font-size: 28px;
            font-weight: 900;
        }

        .receipt-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 0 24px;
        }

        .receipt-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 0 24px;
        }

        .signature-area {
            text-align: center;
            padding: 20px 24px 24px;
        }

        .signature-line {
            width: 35%;
            border: none;
            border-top: 1px solid var(--muted-light);
            margin: 8px auto;
        }

        .footer-text {
            text-align: center;
            padding: 16px 24px;
            font-size: 11px;
            color: var(--muted);
            border-top: 1px solid var(--light);
        }

        /* ===== حالة الدفع ===== */
        .badge-paid {
            background: #ecfdf5;
            color: #059669;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-unpaid {
            background: #fef2f2;
            color: #dc2626;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-continue {
            background: #eff6ff;
            color: var(--primary);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-withdrawn {
            background: #fffbeb;
            color: #d97706;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        /* ===== طباعة احترافية A4 ===== */
        @media print {
            *,
            *::before,
            *::after {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }

            body {
                background: white !important;
                font-size: 11pt;
                line-height: 1.5;
            }

            /* إعدادات الصفحة - A4 Portrait (الديفولت) */
            @page {
                size: A4 portrait;
                margin: 8mm 10mm 12mm 10mm;
            }

            /* A4 Landscape للجداول العريضة */
            @page landscape {
                size: A4 landscape;
                margin: 8mm 10mm 12mm 10mm;
            }

            /* عند وجود أعمدة كثيرة نحوّل تلقائياً إلى Landscape */
            body.wide-report {
                /* يتم التحكم بها عبر JavaScript */
            }

            body.wide-report .report-table-wrapper {
                page: landscape;
            }

            /* إخفاء العناصر غير المطلوبة */
            .report-toolbar,
            .no-print,
            .btn-close-report,
            .customize-panel,
            .report-controls {
                display: none !important;
            }

            /* إظهار كل الصفوف المخفية بالبحث */
            .report-table tbody tr.row-hidden {
                display: table-row !important;
            }

            /* إظهار كل الأعمدة المخفية بالتخصيص */
            .report-table .col-hidden {
                display: table-cell !important;
            }

            /* الحاوية الرئيسية - ملء الصفحة */
            .report-container {
                max-width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            /* البطاقة الرئيسية - بدون ظل ولا حدود مستديرة */
            .report-card {
                box-shadow: none !important;
                border-radius: 0 !important;
                overflow: visible !important;
            }

            /* ===== رأس التقرير ===== */
            .report-header {
                border-radius: 0 !important;
                padding: 16px 20px !important;
                margin: 0 !important;
                page-break-after: avoid !important;
                break-after: avoid !important;
            }

            .report-header::after {
                display: none !important;
            }

            .report-title {
                font-size: 18pt !important;
            }

            .report-subtitle {
                font-size: 11pt !important;
            }

            .report-date {
                font-size: 9pt !important;
                margin-top: 4px !important;
            }

            /* ===== بطاقات KPI ===== */
            .kpi-grid {
                display: grid !important;
                grid-template-columns: repeat(4, 1fr) !important;
                gap: 6px !important;
                padding: 12px 16px !important;
                margin: 0 !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
                page-break-after: avoid !important;
                break-after: avoid !important;
            }

            .kpi-card {
                border-radius: 6px !important;
                padding: 10px 8px !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
                border: 1px solid #e2e8f0 !important;
            }

            .kpi-card::before {
                height: 2px !important;
            }

            .kpi-value {
                font-size: 13pt !important;
            }

            .kpi-label {
                font-size: 8pt !important;
            }

            /* ===== الأقسام ===== */
            .report-section {
                padding: 0 16px !important;
                margin-top: 14px !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            .section-title {
                border-radius: 6px !important;
                padding: 6px 12px !important;
                font-size: 10pt !important;
                margin-bottom: 8px !important;
                page-break-after: avoid !important;
                break-after: avoid !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            /* ===== بطاقات المعلومات ===== */
            .info-grid {
                display: grid !important;
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 6px !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            .info-card {
                border-radius: 6px !important;
                padding: 8px 10px !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
                border: 1px solid #e2e8f0 !important;
            }

            .info-label {
                font-size: 8pt !important;
            }

            .info-value {
                font-size: 10pt !important;
            }

            /* ===== الجداول ===== */
            .report-table-wrapper {
                border-radius: 6px !important;
                border: 1px solid #cbd5e1 !important;
                overflow: visible !important;
                page-break-inside: auto !important;
            }

            .report-table {
                font-size: 9pt !important;
                width: 100% !important;
            }

            /* سطر واحد فقط في الطباعة */
            .report-table thead th,
            .report-table tbody td {
                white-space: nowrap !important;
                overflow: hidden !important;
                text-overflow: ellipsis !important;
            }

            /* إخفاء التلميح والمؤشرات في الطباعة */
            .cell-tooltip,
            .report-table tbody td.cell-truncated::after {
                display: none !important;
            }

            .report-table thead {
                display: table-header-group !important;
            }

            .report-table tfoot[role="repeat-header"] {
                display: table-footer-group !important;
            }

            .report-table tfoot[role="repeat-header"] th {
                padding: 5px 8px !important;
                font-size: 7pt !important;
                background: #f1f5f9 !important;
                color: #64748b !important;
                border-top: 1px solid #cbd5e1 !important;
                border-bottom: none !important;
            }

            .report-table thead th {
                padding: 6px 8px !important;
                font-size: 8pt !important;
                white-space: nowrap !important;
                page-break-after: avoid !important;
                break-after: avoid !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            .report-table tbody td {
                padding: 5px 8px !important;
                font-size: 9pt !important;
            }

            .report-table tbody tr {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            .report-table tbody tr:nth-child(even) {
                background: #f8fafc !important;
            }

            .report-table .total-row {
                background: #eff6ff !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            .report-table .total-row td {
                border-top: 2px solid #818cf8 !important;
            }

            /* ===== الشارات ===== */
            .badge-paid,
            .badge-unpaid,
            .badge-continue,
            .badge-withdrawn {
                padding: 1px 6px !important;
                font-size: 7pt !important;
                border-radius: 10px !important;
            }

            /* ===== وصل الدفع ===== */
            .receipt-container .report-container {
                max-width: 100% !important;
            }

            .receipt-badge {
                padding: 4px !important;
                font-size: 10pt !important;
                border-radius: 4px !important;
            }

            .receipt-amount {
                padding: 12px !important;
                border-radius: 8px !important;
                margin: 10px 16px !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            .receipt-amount .amount-value {
                font-size: 22pt !important;
            }

            .receipt-grid,
            .receipt-summary {
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 6px !important;
                padding: 0 16px !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            .receipt-notes {
                margin: 8px 16px !important;
                border-radius: 6px !important;
                padding: 8px 10px !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            .signature-area {
                padding: 12px 16px 16px !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            .signature-line {
                width: 30% !important;
            }

            /* ===== التذييل ===== */
            .footer-text {
                border-top: 1px solid #e2e8f0 !important;
                padding: 8px 16px !important;
                font-size: 8pt !important;
                margin-top: 12px !important;
            }
        }

        @media (max-width: 768px) {
            .report-toolbar {
                padding: 10px 16px;
                flex-wrap: wrap;
                gap: 8px;
            }

            .toolbar-brand span {
                font-size: 14px;
            }

            .toolbar-actions {
                flex-wrap: wrap;
                gap: 6px;
            }

            .btn-customize {
                padding: 6px 12px;
                font-size: 12px;
            }

            .report-controls {
                padding: 10px 16px;
                gap: 8px;
            }

            .report-search-box {
                max-width: 100%;
                min-width: 100%;
            }

            .report-container {
                margin: 12px auto;
                padding: 0 10px;
            }

            .report-header {
                padding: 20px;
            }

            .report-title {
                font-size: 18px;
            }

            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
                padding: 14px 16px;
            }

            .kpi-value {
                font-size: 15px;
            }

            .report-section {
                padding: 0 16px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .receipt-grid {
                grid-template-columns: 1fr;
            }

            .receipt-summary {
                grid-template-columns: 1fr;
            }

            .receipt-amount .amount-value {
                font-size: 22px;
            }
        }
    </style>
    {% block extra_style %}{% endblock %}
</head>
<body>

    <!-- شريط الأدوات -->
    <div class="report-toolbar no-print">
        <div class="toolbar-brand">
            <i class="fas fa-chart-bar"></i>
            <span>{{ app_title }}</span>
        </div>
        <div class="toolbar-actions">
            <button class="btn-print" onclick="smartPrint()">
                <i class="fas fa-print"></i>
                طباعة / حفظ PDF
            </button>
            <button class="btn-customize" onclick="toggleCustomizePanel()">
                <i class="fas fa-sliders-h"></i>
                تخصيص التقرير
            </button>
            <a href="javascript:history.back()" class="btn-close-report">
                <i class="fas fa-arrow-right"></i>
                رجوع
            </a>
        </div>
    </div>

    <!-- لوحة تخصيص التقرير -->
    <div class="customize-panel no-print" id="customizePanel">
        <h6><i class="fas fa-columns"></i> إظهار / إخفاء الأعمدة</h6>
        <div class="customize-columns" id="customizeColumns">
            <!-- يتم ملؤها تلقائياً من JavaScript -->
        </div>
    </div>

    <!-- شريط البحث والفرز والتصفية -->
    <div class="report-controls no-print" id="reportControls" style="display:none;">
        <div class="report-search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="reportSearchInput" placeholder="بحث في صفوف التقرير..." oninput="filterReportRows()">
        </div>
        <div class="report-sort-box">
            <label><i class="fas fa-sort"></i> فرز:</label>
            <select id="reportSortSelect" onchange="sortReportTable()">
                <option value="">بدون فرز</option>
                <!-- يتم ملؤها تلقائياً -->
            </select>
        </div>
        <div class="report-date-filter" id="dateFilterBox" style="display:none;">
            <label><i class="fas fa-calendar-alt"></i> من:</label>
            <input type="date" id="dateFrom" onchange="filterReportRows()">
            <label>إلى:</label>
            <input type="date" id="dateTo" onchange="filterReportRows()">
        </div>
        <div class="report-controls-count" id="reportCount"></div>
    </div>

    <!-- محتوى التقرير -->
    <div class="report-container {% block container_class %}{% endblock %}">
        <div class="report-card">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script>
        // ===== لوحة تخصيص التقرير =====
        function toggleCustomizePanel() {
            const panel = document.getElementById('customizePanel');
            panel.classList.toggle('open');
            if (panel.classList.contains('open')) {
                buildCustomizeControls();
            }
        }

        function buildCustomizeControls() {
            const container = document.getElementById('customizeColumns');
            container.innerHTML = '';
            const tables = document.querySelectorAll('.report-table');

            tables.forEach((table, tIdx) => {
                const headers = table.querySelectorAll('thead th');
                headers.forEach((th, colIdx) => {
                    const label = th.textContent.trim();
                    if (!label) return;

                    const toggle = document.createElement('label');
                    toggle.className = 'col-toggle active';
                    toggle.innerHTML = `<input type="checkbox" checked data-table="${tIdx}" data-col="${colIdx}" onchange="toggleColumn(this)"> ${label}`;
                    container.appendChild(toggle);
                });
            });
        }

        function toggleColumn(checkbox) {
            const tIdx = parseInt(checkbox.dataset.table);
            const colIdx = parseInt(checkbox.dataset.col);
            const tables = document.querySelectorAll('.report-table');
            const table = tables[tIdx];
            if (!table) return;

            const show = checkbox.checked;
            const toggle = checkbox.closest('.col-toggle');
            toggle.classList.toggle('active', show);

            // إخفاء/إظهار th
            const ths = table.querySelectorAll('thead th');
            if (ths[colIdx]) {
                ths[colIdx].classList.toggle('col-hidden', !show);
            }

            // إخفاء/إظهار td في كل صف
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const tds = row.querySelectorAll('td');
                if (tds[colIdx]) {
                    tds[colIdx].classList.toggle('col-hidden', !show);
                }
            });

            // إخفاء/إظهار tfoot th
            const tfootThs = table.querySelectorAll('tfoot th');
            if (tfootThs[colIdx]) {
                tfootThs[colIdx].classList.toggle('col-hidden', !show);
            }
        }

        // ===== شريط البحث والفرز والتصفية =====
        function initReportControls() {
            const table = document.querySelector('.report-table');
            if (!table) return;

            const controls = document.getElementById('reportControls');
            controls.style.display = 'flex';

            // بناء قائمة الفرز
            const sortSelect = document.getElementById('reportSortSelect');
            sortSelect.innerHTML = '<option value="">بدون فرز</option>';
            const headers = table.querySelectorAll('thead th');
            headers.forEach((th, idx) => {
                const label = th.textContent.trim();
                if (!label) return;
                const opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = label;
                sortSelect.appendChild(opt);
            });

            // كشف أعمدة التاريخ
            detectDateColumns(table);

            // عدد الصفوف
            updateRowCount(table);
        }

        function detectDateColumns(table) {
            const rows = table.querySelectorAll('tbody tr');
            if (rows.length === 0) return;

            const tds = rows[0].querySelectorAll('td');
            let hasDate = false;

            tds.forEach((td, idx) => {
                const text = td.textContent.trim();
                // كشف تنسيقات التاريخ: YYYY-MM-DD أو DD/MM/YYYY أو نص عربي يحتوي أرقام تاريخ
                if (/(\d{4}[-\/]\d{2}[-\/]\d{2})|(\d{2}[-\/]\d{2}[-\/]\d{4})/.test(text)) {
                    hasDate = true;
                }
            });

            if (hasDate) {
                document.getElementById('dateFilterBox').style.display = 'flex';
            }
        }

        function filterReportRows() {
            const table = document.querySelector('.report-table');
            if (!table) return;

            const searchVal = document.getElementById('reportSearchInput').value.trim().toLowerCase();
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;

            const rows = table.querySelectorAll('tbody tr');
            let visibleCount = 0;

            rows.forEach(row => {
                if (row.classList.contains('total-row')) {
                    row.classList.remove('row-hidden');
                    return;
                }

                let showBySearch = true;
                let showByDate = true;

                // بحث نصي
                if (searchVal) {
                    const rowText = row.textContent.toLowerCase();
                    showBySearch = rowText.includes(searchVal);
                }

                // تصفية تاريخ
                if (dateFrom || dateTo) {
                    const dateCells = row.querySelectorAll('td');
                    let rowDateFound = false;
                    dateCells.forEach(td => {
                        const text = td.textContent.trim();
                        // محاولة استخراج التاريخ
                        const match = text.match(/(\d{4})[-\/](\d{2})[-\/](\d{2})/) ||
                                      text.match(/(\d{2})[-\/](\d{2})[-\/](\d{4})/);
                        if (match) {
                            let dateStr;
                            if (match[1].length === 4) {
                                dateStr = `${match[1]}-${match[2]}-${match[3]}`;
                            } else {
                                dateStr = `${match[3]}-${match[2]}-${match[1]}`;
                            }
                            if (dateFrom && dateStr < dateFrom) showByDate = false;
                            if (dateTo && dateStr > dateTo) showByDate = false;
                            rowDateFound = true;
                        }
                    });
                }

                const show = showBySearch && showByDate;
                row.classList.toggle('row-hidden', !show);
                if (show) visibleCount++;
            });

            updateRowCount(table);
        }

        function sortReportTable() {
            const table = document.querySelector('.report-table');
            if (!table) return;

            const colIdx = parseInt(document.getElementById('reportSortSelect').value);
            if (isNaN(colIdx)) return;

            const tbody = table.querySelector('tbody');
            const rows = Array.from(tbody.querySelectorAll('tr:not(.total-row)'));
            const totalRow = tbody.querySelector('tr.total-row');

            // تحديد اتجاه الفرز
            const ths = table.querySelectorAll('thead th');
            const th = ths[colIdx];
            const isAsc = th.classList.contains('sort-asc');

            // إعادة تعيين
            ths.forEach(h => { h.classList.remove('sort-asc', 'sort-desc'); });

            // تبديل الاتجاه
            const newAsc = !isAsc;
            th.classList.add(newAsc ? 'sort-asc' : 'sort-desc');

            rows.sort((a, b) => {
                const aText = a.querySelectorAll('td')[colIdx]?.textContent.trim() || '';
                const bText = b.querySelectorAll('td')[colIdx]?.textContent.trim() || '';

                // محاولة فرز رقمي
                const aNum = parseFloat(aText.replace(/[^\d.-]/g, ''));
                const bNum = parseFloat(bText.replace(/[^\d.-]/g, ''));

                if (!isNaN(aNum) && !isNaN(bNum)) {
                    return newAsc ? aNum - bNum : bNum - aNum;
                }

                // فرز نصي
                return newAsc ? aText.localeCompare(bText, 'ar') : bText.localeCompare(aText, 'ar');
            });

            rows.forEach(row => tbody.appendChild(row));
            if (totalRow) tbody.appendChild(totalRow);
        }

        function updateRowCount(table) {
            const total = table.querySelectorAll('tbody tr:not(.total-row):not(.row-hidden)').length;
            const allTotal = table.querySelectorAll('tbody tr:not(.total-row)').length;
            const countEl = document.getElementById('reportCount');
            if (countEl) {
                if (total === allTotal) {
                    countEl.innerHTML = `<strong>${total}</strong> صف`;
                } else {
                    countEl.innerHTML = `<strong>${total}</strong> من ${allTotal} صف`;
                }
            }
        }

        // ===== طباعة احترافية - ضبط الجداول الطويلة =====
        function smartPrint() {
            // إظهار كل الأعمدة والصفوف مؤقتاً قبل الطباعة
            document.querySelectorAll('.report-table .col-hidden').forEach(el => {
                el.setAttribute('data-was-hidden', 'true');
                el.classList.remove('col-hidden');
            });
            document.querySelectorAll('.report-table tbody tr.row-hidden').forEach(el => {
                el.setAttribute('data-was-hidden', 'true');
                el.classList.remove('row-hidden');
            });

            // كشف الجداول العريضة: إذا أعمدة > 6 نحوّل لـ Landscape
            const tables = document.querySelectorAll('.report-table');
            let isWide = false;
            tables.forEach(table => {
                const colCount = table.querySelectorAll('thead th').length;
                if (colCount > 6) {
                    isWide = true;
                }
            });

            if (isWide) {
                document.body.classList.add('wide-report');
            }

            // تكرار رأس الجدول في كل صفحة
            tables.forEach(table => {
                const thead = table.querySelector('thead');
                const tfoot = table.querySelector('tfoot');
                if (thead && !tfoot) {
                    const newTfoot = document.createElement('tfoot');
                    newTfoot.innerHTML = thead.innerHTML;
                    newTfoot.setAttribute('role', 'repeat-header');
                    table.appendChild(newTfoot);
                }
            });

            // طباعة
            window.print();

            // تنظيف بعد الطباعة
            setTimeout(() => {
                document.querySelectorAll('tfoot[role="repeat-header"]').forEach(el => el.remove());
                document.body.classList.remove('wide-report');

                // إعادة إخفاء ما كان مخفياً
                document.querySelectorAll('[data-was-hidden="true"]').forEach(el => {
                    el.removeAttribute('data-was-hidden');
                    el.classList.add('col-hidden');
                });
                document.querySelectorAll('.report-table tbody tr[data-was-hidden="true"]').forEach(el => {
                    el.removeAttribute('data-was-hidden');
                    el.classList.add('row-hidden');
                });
            }, 500);
        }

        // ===== تلميح احترافي للخلايا المقتطعة =====
        let activeTooltip = null;

        function initCellTooltips() {
            // إنشاء عنصر التلميح
            if (!document.getElementById('cellTooltip')) {
                const tip = document.createElement('div');
                tip.id = 'cellTooltip';
                tip.className = 'cell-tooltip';
                document.body.appendChild(tip);
            }
            activeTooltip = document.getElementById('cellTooltip');

            // فحص كل خلايا الجدول
            const tables = document.querySelectorAll('.report-table');
            tables.forEach(table => {
                const tds = table.querySelectorAll('tbody td');
                tds.forEach(td => {
                    td.removeEventListener('mouseenter', handleCellHover);
                    td.removeEventListener('mouseleave', handleCellLeave);
                    td.addEventListener('mouseenter', handleCellHover);
                    td.addEventListener('mouseleave', handleCellLeave);
                });
            });

            // فحص أولي بعد رسم الجدول
            requestAnimationFrame(() => detectTruncatedCells());
        }

        function detectTruncatedCells() {
            const tables = document.querySelectorAll('.report-table');
            tables.forEach(table => {
                const tds = table.querySelectorAll('tbody td');
                tds.forEach(td => {
                    const isTruncated = td.scrollWidth > td.clientWidth + 2;
                    td.classList.toggle('cell-truncated', isTruncated);
                });
            });
        }

        function handleCellHover(e) {
            const td = e.currentTarget;
            if (!td.classList.contains('cell-truncated')) return;

            const text = td.textContent.trim();
            if (!text || !activeTooltip) return;

            activeTooltip.textContent = text;

            // حساب الموقع
            const rect = td.getBoundingClientRect();
            let left = rect.left + rect.width / 2 - 50;
            let top = rect.bottom + 8;

            // حدود الشاشة
            const tipWidth = Math.min(text.length * 9, 350);
            if (left + tipWidth > window.innerWidth - 16) {
                left = window.innerWidth - tipWidth - 16;
            }
            if (left < 8) left = 8;
            if (top + 60 > window.innerHeight) {
                top = rect.top - 50;
            }

            activeTooltip.style.left = left + 'px';
            activeTooltip.style.top = top + 'px';
            activeTooltip.classList.add('visible');
        }

        function handleCellLeave() {
            if (activeTooltip) {
                activeTooltip.classList.remove('visible');
            }
        }

        // إعادة فحص عند تغيير حجم النافذة
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(detectTruncatedCells, 200);
        });

        // تهيئة أدوات التقرير عند التحميل
        document.addEventListener('DOMContentLoaded', function() {
            initReportControls();
            initCellTooltips();
        });
    </script>
</body>
</html>
