<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}تقرير{% endblock %} - {{ app_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --primary-darker: #3730a3;
            --secondary: #8b5cf6;
            --secondary-light: #a78bfa;
            --secondary-dark: #7c3aed;
            --sidebar-dark: #1e1b4b;
            --sidebar-mid: #2d2a6e;
            --success: #10b981;
            --success-light: #34d399;
            --danger: #ef4444;
            --danger-light: #f87171;
            --warning: #f59e0b;
            --warning-light: #fbbf24;
            --info: #06b6d4;
            --dark: #0f172a;
            --muted: #64748b;
            --muted-light: #94a3b8;
            --light: #f1f5f9;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--light);
            color: var(--dark);
            line-height: 1.7;
            direction: rtl;
        }

        /* ===== شريط الأدوات العلوي ===== */
        .report-toolbar {
            background: linear-gradient(135deg, var(--sidebar-dark) 0%, var(--primary-darker) 100%);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(30, 27, 75, 0.3);
        }

        .toolbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--white);
        }

        .toolbar-brand i {
            font-size: 20px;
            color: var(--secondary-light);
        }

        .toolbar-brand span {
            font-weight: 700;
            font-size: 16px;
        }

        .toolbar-actions {
            display: flex;
            gap: 8px;
        }

        .btn-print {
            background: linear-gradient(135deg, var(--secondary-light), var(--secondary));
            color: var(--white);
            border: none;
            padding: 8px 20px;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-print:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }

        .btn-close-report {
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-close-report:hover {
            background: rgba(255, 255, 255, 0.2);
            color: var(--white);
        }

        /* ===== محتوى التقرير ===== */
        .report-container {
            max-width: 900px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .report-card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        /* ===== رأس التقرير ===== */
        .report-header {
            background: linear-gradient(135deg, var(--sidebar-dark) 0%, var(--primary-darker) 50%, var(--primary-dark) 100%);
            padding: 28px 32px;
            color: var(--white);
            position: relative;
            overflow: hidden;
        }

        .report-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--secondary), var(--primary-light), var(--secondary-light));
        }

        .report-header::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15), transparent 70%);
            border-radius: 50%;
        }

        .report-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 4px;
            position: relative;
        }

        .report-subtitle {
            font-size: 13px;
            font-weight: 400;
            opacity: 0.8;
        }

        .report-date {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 8px;
        }

        /* ===== بطاقات KPI ===== */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            padding: 20px 24px;
        }

        .kpi-card {
            border-radius: 14px;
            padding: 14px 16px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            left: 0;
            height: 3px;
        }

        .kpi-value {
            font-size: 18px;
            font-weight: 800;
            line-height: 1.4;
        }

        .kpi-label {
            font-size: 11px;
            font-weight: 500;
            opacity: 0.7;
            margin-top: 2px;
        }

        .kpi-accent { background: #eff6ff; color: var(--primary); }
        .kpi-accent::before { background: var(--primary); }
        .kpi-success { background: #ecfdf5; color: var(--success); }
        .kpi-success::before { background: var(--success); }
        .kpi-danger { background: #fef2f2; color: var(--danger); }
        .kpi-danger::before { background: var(--danger); }
        .kpi-warning { background: #fffbeb; color: var(--warning); }
        .kpi-warning::before { background: var(--warning); }
        .kpi-info { background: #f0f9ff; color: var(--info); }
        .kpi-info::before { background: var(--info); }
        .kpi-purple { background: #f5f3ff; color: var(--secondary); }
        .kpi-purple::before { background: var(--secondary); }

        /* ===== قسم ===== */
        .report-section {
            padding: 0 24px;
            margin-top: 20px;
        }

        .section-title {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: var(--white);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            font-size: 12px;
            opacity: 0.8;
        }

        /* ===== بطاقات المعلومات ===== */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
        }

        .info-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            transition: box-shadow 0.2s ease;
        }

        .info-card:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .info-label {
            font-size: 11px;
            color: var(--muted);
            font-weight: 500;
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--dark);
        }

        /* ===== الجداول ===== */
        .report-table-wrapper {
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .report-table thead th {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            padding: 10px 14px;
            font-weight: 700;
            font-size: 12px;
            text-align: right;
            white-space: nowrap;
        }

        .report-table thead th.text-center,
        .report-table thead th[style*="center"] {
            text-align: center;
        }

        .report-table tbody td {
            padding: 9px 14px;
            border-bottom: 1px solid var(--light);
            vertical-align: middle;
        }

        .report-table tbody tr:nth-child(even) {
            background: #fafbfc;
        }

        .report-table tbody tr:hover {
            background: #f0f4ff;
        }

        .report-table tbody tr:last-child td {
            border-bottom: none;
        }

        .report-table .total-row {
            background: #eff6ff !important;
            font-weight: 700;
        }

        .report-table .total-row td {
            border-top: 2px solid var(--primary-light);
        }

        /* ===== وصل الدفع ===== */
        .receipt-container {
            max-width: 600px;
        }

        .receipt-amount {
            background: linear-gradient(135deg, var(--secondary), var(--primary-dark));
            color: var(--white);
            text-align: center;
            padding: 16px;
            border-radius: 14px;
            margin: 16px 24px;
        }

        .receipt-amount .amount-label {
            font-size: 12px;
            opacity: 0.8;
        }

        .receipt-amount .amount-value {
            font-size: 28px;
            font-weight: 900;
        }

        .receipt-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 0 24px;
        }

        .receipt-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 0 24px;
        }

        .signature-area {
            text-align: center;
            padding: 20px 24px 24px;
        }

        .signature-line {
            width: 35%;
            border: none;
            border-top: 1px solid var(--muted-light);
            margin: 8px auto;
        }

        .footer-text {
            text-align: center;
            padding: 16px 24px;
            font-size: 11px;
            color: var(--muted);
            border-top: 1px solid var(--light);
        }

        /* ===== حالة الدفع ===== */
        .badge-paid {
            background: #ecfdf5;
            color: #059669;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-unpaid {
            background: #fef2f2;
            color: #dc2626;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-continue {
            background: #eff6ff;
            color: var(--primary);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-withdrawn {
            background: #fffbeb;
            color: #d97706;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        /* ===== طباعة ===== */
        @media print {
            body {
                background: white !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .report-toolbar {
                display: none !important;
            }

            .report-container {
                max-width: 100%;
                margin: 0;
                padding: 0;
            }

            .report-card {
                box-shadow: none !important;
                border-radius: 0 !important;
            }

            .report-header {
                border-radius: 0 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .kpi-card {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .report-table thead th {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .report-table tbody tr:nth-child(even) {
                background: #fafbfc !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .report-table .total-row {
                background: #eff6ff !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .receipt-amount {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .section-title {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .no-print {
                display: none !important;
            }

            @page {
                margin: 10mm;
                size: A4;
            }
        }

        @media (max-width: 768px) {
            .report-toolbar {
                padding: 10px 16px;
            }

            .toolbar-brand span {
                font-size: 14px;
            }

            .report-container {
                margin: 12px auto;
                padding: 0 10px;
            }

            .report-header {
                padding: 20px;
            }

            .report-title {
                font-size: 18px;
            }

            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
                padding: 14px 16px;
            }

            .kpi-value {
                font-size: 15px;
            }

            .report-section {
                padding: 0 16px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .receipt-grid {
                grid-template-columns: 1fr;
            }

            .receipt-summary {
                grid-template-columns: 1fr;
            }

            .receipt-amount .amount-value {
                font-size: 22px;
            }
        }
    </style>
    {% block extra_style %}{% endblock %}
</head>
<body>

    <!-- شريط الأدوات -->
    <div class="report-toolbar no-print">
        <div class="toolbar-brand">
            <i class="fas fa-chart-bar"></i>
            <span>{{ app_title }}</span>
        </div>
        <div class="toolbar-actions">
            <button class="btn-print" onclick="window.print()">
                <i class="fas fa-print"></i>
                طباعة / حفظ PDF
            </button>
            <a href="javascript:history.back()" class="btn-close-report">
                <i class="fas fa-arrow-right"></i>
                رجوع
            </a>
        </div>
    </div>

    <!-- محتوى التقرير -->
    <div class="report-container {% block container_class %}{% endblock %}">
        <div class="report-card">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script>
        // طباعة تلقائية عند فتح وصل الدفع
        if (window.location.pathname.includes('/receipt/')) {
            // لا تطبع تلقائياً - دع المستخدم يضغط الزر
        }
    </script>
</body>
</html>
